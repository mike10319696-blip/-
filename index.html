<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>グルラポイント管理</title>

<style>
body {
  font-family: Arial;
  background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
  color: white;
  text-align: center;
}
.container {
  width: 300px;
  margin: auto;
}
.player {
  background: rgba(255,255,255,0.1);
  padding: 10px;
  margin: 10px;
  border-radius: 10px;
}
input {
  width: 80px;
  padding: 5px;
  border-radius: 5px;
  border: none;
}
button {
  margin: 5px;
  padding: 5px 10px;
  border: none;
  border-radius: 5px;
  background: #00c6ff;
  color: white;
}
</style>
</head>

<body>

<h1>👑 グルラポイント管理</h1>

<div class="container" id="players"></div>

<br>
<input id="name" placeholder="名前">
<button onclick="addPlayer()">追加</button>

<script>
const PASSWORD = "gururateikoku123";

let isAdmin = false;

let players = JSON.parse(localStorage.getItem("players")) || [
  {name: "美谷", point: 100},
  {name: "岸波", point: 100},
  {name: "山元", point: 100},
  {name: "西田", point: 100},
  {name: "野村", point: 100}
];

function save(){
  localStorage.setItem("players", JSON.stringify(players));
}

function askPassword(){
  let input = prompt("パスワードを入力");
  if(input === PASSWORD){
    isAdmin = true;
    alert("管理者モードON");
    render();
  } else {
    alert("違う");
  }
}

function render() {
  players.sort((a,b)=>b.point-a.point);
  let html = "";
  players.forEach((p, i) => {
    html += `<div class="player">
      <b>${i+1}位 ${p.name}</b><br>`;

    if(isAdmin){
      html += `<input type="number" value="${p.point}" 
        onchange="updatePoint(${i}, this.value)">`;
    } else {
      html += `<span>${p.point}</span>`;
    }

    html += `</div>`;
  });
  document.getElementById("players").innerHTML = html;
  save();
}

function updatePoint(i, val){
  players[i].point = parseInt(val) || 0;
  render();
}

function addPlayer(){
  if(!isAdmin){
    alert("管理者だけ追加できます");
    return;
  }
  let name = document.getElementById("name").value;
  if(name){
    players.push({name: name, point: 100});
    document.getElementById("name").value = "";
    render();
  }
}

render();
</script>

<br>
<button onclick="askPassword()">管理者モード</button>

</body>
</html>
